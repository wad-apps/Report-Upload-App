<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月報管理ダッシュボード</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- ログイン画面 -->
  <div id="screen-login" class="screen active">
    <div class="login-box">
      <h1>月報管理</h1>
      <p class="login-sub">管理トークンを入力してください</p>
      <input type="password" id="input-token" class="input-token" placeholder="管理トークン">
      <button class="btn btn-primary btn-full" id="btn-login">ログイン</button>
      <p id="login-error" class="error-msg hidden">トークンが正しくありません</p>
    </div>
  </div>

  <!-- メイン画面 -->
  <div id="screen-main" class="screen">

    <header class="header">
      <h1 class="header-title">月報管理ダッシュボード</h1>
      <div class="header-controls">
        <input type="month" id="input-yearmonth" class="input-month">
        <button class="btn btn-outline" id="btn-export">CSV出力</button>
        <button class="btn btn-ghost" id="btn-logout">ログアウト</button>
      </div>
    </header>

    <main class="main-content">

      <!-- 統計カード -->
      <section class="stats-row" id="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">-</div>
          <div class="stat-label">提出総数</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-value" id="stat-pending">-</div>
          <div class="stat-label">確認待ち</div>
        </div>
        <div class="stat-card confirmed">
          <div class="stat-value" id="stat-confirmed">-</div>
          <div class="stat-label">確定済み</div>
        </div>
        <div class="stat-card error">
          <div class="stat-value" id="stat-error">-</div>
          <div class="stat-label">OCRエラー</div>
        </div>
      </section>

      <!-- ドライバー一覧 -->
      <section class="table-section">
        <div class="table-header">
          <h2>ドライバー別 提出状況</h2>
          <button class="btn btn-sm btn-outline" id="btn-refresh">更新</button>
        </div>
        <div class="table-wrap">
          <table id="driver-table">
            <thead>
              <tr>
                <th>ドライバー名</th>
                <th>現場</th>
                <th>稼働日数</th>
                <th>請求金額</th>
                <th>ステータス</th>
                <th>OCR完了</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="driver-tbody">
              <tr><td colspan="7" class="empty-cell">データを読み込んでいます...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <!-- OCR確認画面 -->
  <div id="screen-ocr" class="screen">
    <header class="header">
      <button class="btn btn-ghost" id="btn-back-to-list">← 一覧に戻る</button>
      <h2 id="ocr-header-title" class="header-title">-</h2>
      <a id="ocr-file-link" href="#" target="_blank" class="btn btn-outline">ファイルを開く ↗</a>
    </header>

    <main class="main-content">
      <div class="ocr-layout">

        <!-- 日別データテーブル -->
        <section class="ocr-table-section">
          <div class="ocr-summary" id="ocr-summary">
            <span>単価: <strong id="ocr-unit-price">-</strong></span>
            <span>稼働日数: <strong id="ocr-working-days">-</strong> 日</span>
            <span>請求合計: <strong id="ocr-billing">-</strong></span>
            <span id="ocr-note-badge" class="flag-badge note hidden">備考あり</span>
          </div>
          <div class="table-wrap">
            <table id="ocr-table">
              <thead>
                <tr>
                  <th>日</th>
                  <th>開始時間</th>
                  <th>終了時間</th>
                  <th>稼働</th>
                </tr>
              </thead>
              <tbody id="ocr-tbody"></tbody>
            </table>
          </div>
        </section>

      </div>

      <!-- 操作ボタン -->
      <div class="ocr-actions">
        <button class="btn btn-outline" id="btn-save-correction">修正を保存</button>
        <button class="btn btn-confirm" id="btn-confirm-month" disabled>この月を確定する</button>
      </div>

    </main>
  </div>

  <!-- CSV出力モーダル -->
  <div id="modal-export" class="modal hidden">
    <div class="modal-box">
      <h3>CSV出力</h3>
      <p id="export-yearmonth-label"></p>
      <div class="table-wrap" style="margin: 16px 0;">
        <table id="export-table">
          <thead>
            <tr>
              <th>ドライバー名</th><th>現場</th><th>稼働日数</th>
              <th>実働時間(h)</th><th>単価</th><th>請求金額</th>
            </tr>
          </thead>
          <tbody id="export-tbody"></tbody>
        </table>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-modal-close">閉じる</button>
        <button class="btn btn-primary" id="btn-download-csv">CSVダウンロード</button>
      </div>
    </div>
  </div>
  <div id="modal-overlay" class="modal-overlay hidden"></div>

  <!-- トースト -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/dashboard.js"></script>
</body>
</html>
