<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>月報アップロード</title>
  <link rel="stylesheet" href="css/style.css?v=20260623b">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

  <!-- ローディング画面 -->
  <div id="screen-loading" class="screen active">
    <div class="loading-inner">
      <div class="spinner"></div>
      <p>読み込み中...</p>
    </div>
  </div>

  <!-- 現場選択画面 -->
  <div id="screen-site" class="screen">
    <header class="app-header">
      <h1>月報アップロード</h1>
      <p id="site-driver-name" class="driver-info">-</p>
    </header>
    <main class="container">
      <section class="card">
        <p class="section-title">現場を選択</p>
        <div id="site-list"></div>
      </section>
    </main>
  </div>

  <!-- メイン画面: 月報アップロード -->
  <div id="screen-main" class="screen">
    <header class="app-header">
      <h1>月報アップロード</h1>
      <p id="driver-info" class="driver-info">-</p>
    </header>

    <main class="container">
      <section class="card">
        <h2 class="section-title">対象年月を選択</h2>
        <input type="month" id="input-yearmonth" class="input-month">
      </section>

      <section class="card upload-area" id="upload-area">
        <div class="upload-icon">📷</div>
        <p class="upload-label">月報を撮影またはPDFを選択</p>
        <p class="upload-sub">写真（JPG/PNG）またはPDFに対応</p>
        <input type="file" id="file-input" accept="image/*,application/pdf" class="file-input-hidden">
        <div class="upload-buttons">
          <button class="btn btn-camera" id="btn-camera">📷 撮影</button>
          <button class="btn btn-file"   id="btn-file">📄 ファイル選択</button>
        </div>
      </section>

      <section class="card preview-area hidden" id="preview-area">
        <p class="preview-label">選択したファイル</p>
        <img id="preview-image" class="preview-image hidden" alt="プレビュー">
        <p id="preview-filename" class="preview-filename"></p>
        <p id="preview-filesize" class="preview-filesize"></p>
        <button class="btn btn-cancel" id="btn-cancel-file">✕ 選択し直す</button>
      </section>

      <section class="card" id="attachment-section">
        <p class="section-title">添付ファイル（任意）</p>
        <div id="attachment-list"></div>
        <p id="attachment-size-info" class="attachment-size-info hidden"></p>
        <input type="file" id="attachment-input" accept="image/*,application/pdf" class="file-input-hidden" multiple>
        <button class="btn btn-attachment" id="btn-add-attachment">＋ 添付ファイルを追加</button>
      </section>

      <section class="card checklist-section" id="checklist-section">
        <p class="checklist-title">送信前に確認してください</p>
        <label class="checklist-item"><input type="checkbox" class="submit-check" id="chk1"> 本請求書を月末最終稼働日に提出する</label>
        <label class="checklist-item"><input type="checkbox" class="submit-check" id="chk2"> 稼働・開始/終了時間を間違いなく記入した</label>
        <label class="checklist-item"><input type="checkbox" class="submit-check" id="chk3"> 単価・稼働日数・請求合計を正しく記入した</label>
        <label class="checklist-item"><input type="checkbox" class="submit-check" id="chk4"> 立替、残業・早出、距離超過については立替欄及び備考欄に記入した</label>
        <label class="checklist-item"><input type="checkbox" class="submit-check" id="chk5"> 氏名、現場名、請求期間を確認した</label>
        <label class="checklist-item checklist-consent"><input type="checkbox" class="submit-check" id="chk-bill"> この内容で請求することに同意する</label>
      </section>

      <button class="btn btn-submit" id="btn-submit" disabled>提出する</button>
    </main>

    <!-- 提出済み一覧 -->
    <section class="container">
      <h2 class="section-title">提出履歴</h2>
      <div id="report-list" class="report-list">
        <p class="empty-text">提出済みの月報はありません</p>
      </div>
    </section>
  </div>

  <!-- 送信中オーバーレイ -->
  <div id="overlay-uploading" class="overlay hidden">
    <div class="overlay-inner">
      <div class="spinner"></div>
      <p id="overlay-text">送信中...</p>
    </div>
  </div>

  <!-- 完了画面 -->
  <div id="screen-done" class="screen">
    <div class="done-inner">
      <div class="done-icon">✅</div>
      <h2>送信完了</h2>
      <p id="done-message"></p>
      <p id="done-tag-url" style="font-size:11px;color:#888;word-break:break-all;margin:8px 0;display:none"></p>
      <button class="btn btn-primary" id="btn-to-line">LINEに戻る</button>
    </div>
  </div>

  <!-- 確認モーダル -->
  <div id="confirm-overlay" class="overlay hidden">
    <div class="confirm-box">
      <p id="confirm-msg" class="confirm-msg"></p>
      <div class="confirm-buttons">
        <button class="btn btn-primary" id="btn-confirm-ok">上書きして再提出</button>
        <button class="btn btn-cancel" id="btn-confirm-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- エラートースト -->
  <div id="toast" class="toast hidden"></div>

  <script src="config.js?v=20260623b"></script>
  <script src="js/app.js?v=20260623b"></script>
</body>
</html>
